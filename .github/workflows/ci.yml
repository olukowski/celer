name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all --lib --tests --all-features -- -D warnings

  test:
    name: Tests (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: i686-unknown-linux-gnu
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6

      - name: Install i686 dependencies
        if: startsWith(matrix.target, 'i686')
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Run tests
        run: |
          cargo nextest run \
            --target ${{ matrix.target }} \
            --all-features \
            --workspace \
            --lib \
            --tests \
            --no-tests pass

  coverage:
    needs: test
    name: Coverage (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: i686-unknown-linux-gnu

          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install i686 dependencies
        if: startsWith(matrix.target, 'i686')
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        run: |
          cargo +nightly llvm-cov nextest \
            --target ${{ matrix.target }} \
            --branch \
            --all-features \
            --workspace \
            --lib \
            --tests \
            --lcov \
            --output-path lcov-${{ matrix.target }}.info \
            --no-tests pass

      - name: Upload coverage
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov-${{ matrix.target }}.info
          flag-name: ${{ matrix.target }}
          parallel: true

  coverage-finish:
    name: Finish Coverage
    needs: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Finish coverage
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true

  miri:
    name: Miri
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - uses: Swatinem/rust-cache@v2

      - name: Setup Miri
        run: cargo +nightly miri setup

      - name: Run Miri tests
        run: MIRIFLAGS="-Zmiri-strict-provenance" cargo +nightly miri test --workspace --lib --tests
